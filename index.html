<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F5F0E8">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Cascade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=BIZ+UDGothic:wght@400;700&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --kinari: #F5F0E8;
  --kinari-2: #EDE7D9;
  --kinari-3: #E4DDD0;
  --sumi: #1C1C1A;
  --sumi-soft: #3D3B33;
  --sumi-muted: #7A776E;
  --ki: #C4833A;
  --ki-pale: #EDD5A8;
  --ki-deep: #9E6228;
  --take: #4A5C42;
  --tetsusabi: #5C4033;
  --line: rgba(28,28,26,0.10);
  --line-strong: rgba(28,28,26,0.22);
  --shadow: 0 2px 12px rgba(28,28,26,0.08);
  --shadow-up: 0 -2px 16px rgba(28,28,26,0.06);
  --font-mincho: 'Shippori Mincho', serif;
  --font-gothic: 'BIZ UDGothic', system-ui, sans-serif;
  --font-latin: 'Space Grotesk', system-ui;
  --r1: 2px; --r2: 4px; --r3: 8px; --r4: 16px;
  --ease-struct: cubic-bezier(0.16, 0.84, 0.32, 1);
  --ease-snap: cubic-bezier(0.34, 1.56, 0.64, 1);
  --nav-h: calc(60px + env(safe-area-inset-bottom));
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--kinari);
  color: var(--sumi);
  font-family: var(--font-gothic);
  font-size: 15px;
  line-height: 1.6;
  overscroll-behavior: none;
}

/* ── App Shell ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}

/* ── Views ── */
.view {
  display: none;
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 24px 20px;
  padding-bottom: calc(var(--nav-h) + 16px);
  overscroll-behavior-y: contain;
}
.view.active { display: block; }

/* ── Bottom Nav ── */
#nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  height: var(--nav-h);
  background: var(--kinari);
  border-top: 1px solid var(--line);
  display: flex;
  align-items: flex-start;
  padding-bottom: env(safe-area-inset-bottom);
  box-shadow: var(--shadow-up);
  z-index: 100;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-top: 10px;
  gap: 3px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--sumi-muted);
  font-family: var(--font-gothic);
  font-size: 10px;
  letter-spacing: 0.02em;
  position: relative;
  transition: color 0.2s;
}
.nav-item.active { color: var(--ki); }
.nav-item.active::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 2px;
  background: var(--ki);
  border-radius: 0 0 2px 2px;
}
.nav-icon { font-size: 20px; line-height: 1; }

/* ── Typography ── */
.screen-title {
  font-family: var(--font-mincho);
  font-weight: 500;
  font-size: clamp(18px, 5vw, 22px);
  color: var(--sumi);
  letter-spacing: 0.04em;
  margin-bottom: 24px;
}

.label {
  font-family: var(--font-latin);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--sumi-muted);
}

/* ── Card ── */
.card {
  background: var(--kinari-2);
  border-radius: var(--r3);
  padding: 16px;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
}

/* ── Wake Gate（起床打刻ページ）── */
#morning-gate {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: var(--kinari);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 48px 28px calc(48px + env(safe-area-inset-bottom));
}
#morning-gate.open { display: flex; }

.wake-date {
  font-family: var(--font-mincho);
  font-size: 17px;
  color: var(--sumi-soft);
  letter-spacing: 0.08em;
  opacity: 0;
  animation: fadeUp 0.5s 0.1s var(--ease-struct) forwards;
}

.wake-clock {
  font-family: var(--font-latin);
  font-weight: 600;
  font-size: clamp(52px, 19vw, 92px);
  color: var(--sumi);
  font-feature-settings: "tnum";
  line-height: 1;
  letter-spacing: 0.01em;
  margin: 14px 0 6px;
  opacity: 0;
  animation: fadeUp 0.6s 0.2s var(--ease-struct) forwards;
}
.wake-clock .sec {
  color: var(--ki);
  font-size: 0.46em;
  font-weight: 400;
  margin-left: 3px;
}

.wake-sub {
  font-family: var(--font-mincho);
  font-size: 15px;
  letter-spacing: 0.1em;
  color: var(--sumi-muted);
  margin-bottom: 56px;
  opacity: 0;
  animation: fadeUp 0.5s 0.35s var(--ease-struct) forwards;
}

.wake-btn {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  background: var(--sumi);
  color: var(--kinari);
  font-family: var(--font-mincho);
  font-size: 26px;
  font-weight: 500;
  letter-spacing: 0.14em;
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 10px 36px rgba(28,28,26,0.20);
  transition: transform 0.2s var(--ease-snap), background 0.2s;
  -webkit-appearance: none;
  opacity: 0;
  animation: fadeUp 0.6s 0.5s var(--ease-struct) forwards;
}
.wake-btn:active { transform: scale(0.93); background: var(--ki); }
.wake-btn .wake-btn-sub {
  font-family: var(--font-latin);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  opacity: 0.55;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Home View ── */
.home-date {
  font-family: var(--font-mincho);
  font-size: clamp(22px, 6vw, 28px);
  font-weight: 700;
  color: var(--sumi);
  line-height: 1.2;
  margin-bottom: 4px;
}
.home-weekday {
  font-family: var(--font-latin);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--sumi-muted);
  text-transform: uppercase;
  margin-bottom: 24px;
}

/* ── Line Chart（起床・体重 共通）── */
.line-chart-svg { width: 100%; height: auto; display: block; }
.chart-empty {
  color: var(--sumi-muted);
  font-size: 13px;
  font-family: var(--font-mincho);
  line-height: 1.8;
  text-align: center;
  padding: 18px 0;
}
.chart-today-line {
  font-family: var(--font-gothic);
  font-size: 13px;
  color: var(--sumi-soft);
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--line);
}
.chart-today-line b {
  font-family: var(--font-latin);
  font-weight: 600;
  font-size: 16px;
  color: var(--ki-deep);
  margin-left: 4px;
}

/* ── Weight input ── */
.weight-input-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
}
.weight-input {
  flex: 1;
  min-width: 0;
  padding: 12px 14px;
  background: var(--kinari-3);
  border: 1px solid var(--line-strong);
  border-radius: var(--r2);
  font-family: var(--font-latin);
  font-size: 18px;
  font-weight: 600;
  color: var(--sumi);
  outline: none;
  -webkit-appearance: none;
  transition: border-color 0.2s;
}
.weight-input:focus { border-color: var(--ki); }
.weight-input::placeholder { font-weight: 400; color: var(--sumi-muted); }
.weight-unit {
  font-family: var(--font-gothic);
  font-size: 14px;
  color: var(--sumi-muted);
  flex-shrink: 0;
}
.weight-save-btn {
  padding: 12px 20px;
  background: var(--sumi);
  color: var(--kinari);
  font-family: var(--font-mincho);
  font-size: 14px;
  letter-spacing: 0.08em;
  border: none;
  border-radius: var(--r2);
  cursor: pointer;
  flex-shrink: 0;
  -webkit-appearance: none;
  transition: background 0.2s, transform 0.15s var(--ease-snap);
}
.weight-save-btn:active { transform: scale(0.96); background: var(--ki); }

/* ── Data backup ── */
.data-btn-row { display: flex; gap: 8px; }
.data-btn {
  flex: 1;
  padding: 12px;
  background: var(--kinari-3);
  color: var(--sumi);
  font-family: var(--font-mincho);
  font-size: 14px;
  letter-spacing: 0.06em;
  border: 1px solid var(--line-strong);
  border-radius: var(--r2);
  cursor: pointer;
  -webkit-appearance: none;
  transition: background 0.2s, border-color 0.2s, transform 0.15s var(--ease-snap);
}
.data-btn:active { transform: scale(0.97); background: var(--ki-pale); border-color: var(--ki); }
.data-hint {
  font-family: var(--font-gothic);
  font-size: 11px;
  color: var(--sumi-muted);
  margin-top: 10px;
  line-height: 1.5;
}

.app-version {
  text-align: center;
  font-family: var(--font-latin);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--sumi-muted);
  opacity: 0.6;
  margin-top: 4px;
}

/* ── Habit Stack View ── */
.habit-item {
  background: var(--kinari-2);
  border-radius: var(--r3);
  padding: 14px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  border-left: 3px solid transparent;
  box-shadow: var(--shadow);
  transition: background 0.2s, border-color 0.2s, transform 0.15s var(--ease-snap);
  user-select: none;
}
.habit-item.done {
  background: var(--ki-pale);
  border-left-color: var(--ki);
}
.habit-item:active { transform: scale(0.985); }

.habit-icon { font-size: 22px; line-height: 1; flex-shrink: 0; }
.habit-label {
  flex: 1;
  font-family: var(--font-gothic);
  font-size: 15px;
  color: var(--sumi);
  font-weight: 700;
}
.habit-item.done .habit-label { color: var(--ki-deep); }
.habit-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--line-strong);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s, border-color 0.2s;
}
.habit-item.done .habit-check {
  background: var(--ki);
  border-color: var(--ki);
}
.habit-check-svg { display: none; }
.habit-item.done .habit-check-svg { display: block; }

@keyframes habitBounce {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.06); }
  70%  { transform: scale(0.97); }
  100% { transform: scale(1); }
}
.habit-item.bounce { animation: habitBounce 0.35s var(--ease-struct); }

.heatmap-section {
  margin-top: 24px;
  margin-bottom: 8px;
}
.heatmap-title {
  font-family: var(--font-latin);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--sumi-muted);
  margin-bottom: 10px;
}
.heatmap-grid {
  display: grid;
  grid-template-columns: auto repeat(7, 1fr);
  gap: 3px;
  font-size: 0;
}
.heatmap-row-label {
  font-family: var(--font-gothic);
  font-size: 9px;
  color: var(--sumi-muted);
  display: flex;
  align-items: center;
  padding-right: 4px;
  white-space: nowrap;
}
.heatmap-cell {
  aspect-ratio: 1;
  border-radius: 2px;
  background: var(--kinari-3);
}
.heatmap-cell.done { background: var(--ki); }
.heatmap-day-label {
  font-family: var(--font-latin);
  font-size: 9px;
  color: var(--sumi-muted);
  text-align: center;
  padding-bottom: 2px;
}

/* ── Intersection Observer reveal ── */
.reveal {
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.5s var(--ease-struct), transform 0.5s var(--ease-struct);
}
.reveal.visible {
  opacity: 1;
  transform: none;
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: calc(var(--nav-h) + 12px);
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--sumi);
  color: var(--kinari);
  font-family: var(--font-gothic);
  font-size: 13px;
  padding: 10px 20px;
  border-radius: 20px;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  z-index: 300;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>
<div id="app">
  <!-- Wake Gate（起床打刻ページ）-->
  <div id="morning-gate">
    <div class="wake-date" id="wake-date"></div>
    <div class="wake-clock" id="wake-clock">--:--<span class="sec">--</span></div>
    <div class="wake-sub">おはようございます</div>
    <button class="wake-btn" id="wake-btn">
      起床
      <span class="wake-btn-sub">tap to record</span>
    </button>
  </div>

  <!-- Views -->
  <main id="views" style="flex:1;min-height:0;overflow:hidden;position:relative;display:flex;flex-direction:column;">
    <!-- Home -->
    <section class="view active" id="view-home">
      <div class="home-date" id="home-date"></div>
      <div class="home-weekday" id="home-weekday"></div>

      <div class="card reveal" id="wake-chart-card">
        <div class="label" style="margin-bottom:14px">起床リズム — 直近14日</div>
        <div class="weight-input-row">
          <input type="time" id="wake-input" class="weight-input">
          <button class="weight-save-btn" id="wake-save-btn">記録</button>
        </div>
        <div id="wake-chart"></div>
        <div class="chart-today-line" id="wake-today-line"></div>
      </div>

      <div class="card reveal" id="weight-card">
        <div class="label" style="margin-bottom:14px">体重リズム — 直近14日</div>
        <div class="weight-input-row">
          <input type="number" id="weight-input" class="weight-input" placeholder="今日の体重" step="0.1" min="0" inputmode="decimal" enterkeyhint="done" autocomplete="off">
          <span class="weight-unit">kg</span>
          <button class="weight-save-btn" id="weight-save-btn">記録</button>
        </div>
        <div id="weight-chart"></div>
        <div class="chart-today-line" id="weight-today-line"></div>
      </div>

      <div class="card reveal" id="study-card">
        <div class="label" style="margin-bottom:14px">建築士勉強 — 直近14日</div>
        <div id="study-menu"></div>
        <div class="weight-input-row">
          <input type="number" id="study-input" class="weight-input" placeholder="今日の勉強時間" step="5" min="0" inputmode="numeric" enterkeyhint="done" autocomplete="off">
          <span class="weight-unit">分</span>
          <button class="weight-save-btn" id="study-save-btn">記録</button>
        </div>
        <div id="study-chart"></div>
        <div class="chart-today-line" id="study-today-line"></div>
      </div>

      <div class="card reveal" id="data-card">
        <div class="label" style="margin-bottom:12px">データのバックアップ</div>
        <div class="data-btn-row">
          <button class="data-btn" id="export-btn">書き出す</button>
          <button class="data-btn" id="import-btn">読み込む</button>
        </div>
        <div class="data-hint">端末を変える前や、念のための保存に。JSON ファイルとして書き出し・復元できます。</div>
      </div>

      <div class="app-version">Cascade · 2026-06-12 更新</div>
    </section>

    <!-- Habit Stack -->
    <section class="view" id="view-habits">
      <h2 class="screen-title">習慣スタック</h2>
      <div id="habit-list"></div>
      <div class="heatmap-section">
        <div class="heatmap-title">今週の記録</div>
        <div class="heatmap-grid" id="heatmap-grid"></div>
      </div>
    </section>
  </main>

  <!-- Bottom Nav -->
  <nav id="nav">
    <button class="nav-item active" data-view="home">
      <span class="nav-icon">⌂</span>
      <span>ホーム</span>
    </button>
    <button class="nav-item" data-view="habits">
      <span class="nav-icon">◎</span>
      <span>習慣</span>
    </button>
  </nav>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Store ──
const STORE_KEY = 'cascade_v1';
const DEFAULT_HABITS = [
  {id:'h2',label:'筋トレ',icon:'💪'},
  {id:'h4',label:'間食増量',icon:'🍱'},
  {id:'h6',label:'修論作業',icon:'✏️'},
  {id:'h7',label:'読書',icon:'📚'},
  {id:'h8',label:'日記振り返り',icon:'📓'},
];

function freshStore() {
  return {
    settings: { lastWakeDate: '' },
    habits: { definitions: DEFAULT_HABITS, logs: {} },
    wakeLog: [],
    weightLog: [],
    studyLog: [],
  };
}

// 既存の localStorage を現行スキーマへ移行（後方互換・不要フィールド除去）
function migrate(s) {
  if (!s || typeof s !== 'object') return freshStore();
  s.settings = s.settings || {};
  if (s.settings.lastWakeDate === undefined) s.settings.lastWakeDate = '';
  delete s.settings.lastQuoteIndex;
  delete s.settings.lastMorningGateDate;
  s.habits = s.habits || { definitions: DEFAULT_HABITS, logs: {} };
  s.habits.definitions = DEFAULT_HABITS;            // 常に最新の習慣定義（早起き・体重は除外）
  if (!s.habits.logs) s.habits.logs = {};
  if (!Array.isArray(s.wakeLog)) s.wakeLog = [];
  if (!Array.isArray(s.weightLog)) s.weightLog = [];
  if (!Array.isArray(s.studyLog)) s.studyLog = [];
  // 旧バージョンの未使用フィールドを破棄
  delete s.daily;
  delete s.tasks;
  delete s.streak;
  return s;
}

function loadStore() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return migrate(JSON.parse(raw));
  } catch(e) {}
  return freshStore();
}

function saveStore() {
  localStorage.setItem(STORE_KEY, JSON.stringify(store));
}

let store = loadStore();

// ── Date helpers ──
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function ensureToday() {
  const t = todayStr();
  if (!store.habits.logs[t]) store.habits.logs[t] = {};
}

function getWeekDates() {
  const dates = [];
  const today = new Date();
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    dates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
  }
  return dates;
}

const byDate = (a, b) => a.date < b.date ? -1 : 1;

// ── Wake Gate（起床打刻ページ）──
let wakeClockTimer = null;

function showWakeGate() {
  const gate = document.getElementById('morning-gate');
  gate.classList.add('open');
  const d = new Date();
  const DAYS = ['日','月','火','水','木','金','土'];
  document.getElementById('wake-date').textContent =
    `${d.getMonth()+1}月${d.getDate()}日（${DAYS[d.getDay()]}）`;
  updateWakeClock();
  if (wakeClockTimer) clearInterval(wakeClockTimer);
  wakeClockTimer = setInterval(updateWakeClock, 1000);
}

function updateWakeClock() {
  const d = new Date();
  const p = n => String(n).padStart(2,'0');
  const el = document.getElementById('wake-clock');
  if (el) el.innerHTML = `${p(d.getHours())}:${p(d.getMinutes())}<span class="sec">${p(d.getSeconds())}</span>`;
}

function closeWakeGate() {
  if (wakeClockTimer) { clearInterval(wakeClockTimer); wakeClockTimer = null; }
  document.getElementById('morning-gate').classList.remove('open');
}

document.getElementById('wake-btn').addEventListener('click', () => {
  const t = todayStr();
  const d = new Date();
  const p = n => String(n).padStart(2,'0');
  const hh = d.getHours(), mm = d.getMinutes();
  const time = `${p(hh)}:${p(mm)}`;
  // その日の最初の打刻のみ採用（重複追加しない）
  if (!store.wakeLog.some(w => w.date === t)) {
    store.wakeLog.push({ date: t, time, minutes: hh * 60 + mm });
  }
  store.settings.lastWakeDate = t;
  saveStore();
  if ('vibrate' in navigator) navigator.vibrate([20, 30, 40]);
  closeWakeGate();
  navigate('home');
  showToast(`${time} に起床を記録しました`);
});

// ── Navigation ──
function navigate(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('view-' + viewId).classList.add('active');
  document.querySelector(`.nav-item[data-view="${viewId}"]`)?.classList.add('active');
  if (viewId === 'home') renderHome();
  if (viewId === 'habits') renderHabits();
  activateReveal();
}

document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => navigate(btn.dataset.view));
});

// ── Intersection Observer for reveal ──
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); revealObserver.unobserve(e.target); } });
}, { threshold: 0.1 });

function activateReveal() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.reveal:not(.visible)').forEach(el => revealObserver.observe(el));
  });
}

// ── Home ──
function renderHome() {
  ensureToday();
  const d = new Date();
  const DAYS = ['日','月','火','水','木','金','土'];
  document.getElementById('home-date').textContent = `${d.getMonth()+1}月${d.getDate()}日`;
  document.getElementById('home-weekday').textContent = `${DAYS[d.getDay()]}曜日 — ${d.getFullYear()}`;
  renderWakeChart();
  renderWeightChart();
  renderStudyChart();
}

// ── Line Chart（起床・体重 共通の SVG 折れ線描画）──
// invert=true: 値が小さいほど上（起床=早い時刻ほど上）
// invert=false: 値が大きいほど上（体重=標準）
function buildLineChartSVG(data, { fmt, invert, ariaLabel }) {
  const W = 320, H = 168, padL = 42, padR = 14, padT = 14, padB = 28;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const t = todayStr();
  const vals = data.map(d => d.value);
  let lo = Math.min(...vals), hi = Math.max(...vals);
  if (lo === hi) { const m = Math.max(0.5, Math.abs(lo) * 0.03); lo -= m; hi += m; }
  else { const pad = Math.max(0.5, (hi - lo) * 0.25); lo -= pad; hi += pad; }
  const n = data.length;
  const xAt = i => n === 1 ? padL + plotW / 2 : padL + plotW * i / (n - 1);
  const yAt = v => invert
    ? padT + (v - lo) / (hi - lo) * plotH
    : padT + (hi - v) / (hi - lo) * plotH;

  let grid = '';
  for (let g = 0; g <= 2; g++) {
    const frac = g / 2;
    const v = invert ? lo + (hi - lo) * frac : hi - (hi - lo) * frac;
    const y = (padT + plotH * frac).toFixed(1);
    grid += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="rgba(28,28,26,0.10)" stroke-width="1"/>`;
    grid += `<text x="${padL - 6}" y="${(+y + 3).toFixed(1)}" text-anchor="end" font-family="'Space Grotesk',sans-serif" font-size="9" fill="#7A776E">${fmt(v)}</text>`;
  }

  const pts = data.map((d, i) => `${xAt(i).toFixed(1)},${yAt(d.value).toFixed(1)}`).join(' ');
  const line = n > 1
    ? `<polyline points="${pts}" fill="none" stroke="#C4833A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`
    : '';

  let dots = '', xlabels = '';
  data.forEach((d, i) => {
    const cx = xAt(i).toFixed(1), cy = yAt(d.value).toFixed(1);
    const isToday = d.date === t;
    dots += `<circle cx="${cx}" cy="${cy}" r="${isToday ? 4.5 : 3}" fill="${isToday ? '#4A5C42' : '#9E6228'}"/>`;
    if (i === 0 || i === n - 1 || (n > 4 && i === Math.floor((n - 1) / 2))) {
      const md = d.date.slice(5).replace('-', '/');
      xlabels += `<text x="${cx}" y="${H - 10}" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-size="9" fill="#7A776E">${md}</text>`;
    }
  });

  return `<svg class="line-chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="${ariaLabel}">${grid}${line}${dots}${xlabels}</svg>`;
}

function emptyChartMsg(text) {
  return `<div class="chart-empty">まだ記録がありません。<br>${text}</div>`;
}

const fmtTime = m => {
  m = Math.round(m);
  let hh = Math.floor(m / 60), mm = ((m % 60) + 60) % 60;
  hh = ((hh % 24) + 24) % 24;
  return `${hh}:${String(mm).padStart(2, '0')}`;
};
const fmtKg = v => v.toFixed(1);
const fmtMin = v => `${Math.round(v)}`;

function renderWakeChart() {
  const container = document.getElementById('wake-chart');
  const todayLine = document.getElementById('wake-today-line');
  if (!container) return;
  const t = todayStr();
  const all = (store.wakeLog || []).slice().sort(byDate);
  const log = all.slice(-14);
  const todayRec = all.find(w => w.date === t);
  todayLine.innerHTML = todayRec
    ? `今日の起床<b>${todayRec.time}</b>`
    : '今日はまだ起床を記録していません';
  if (log.length === 0) {
    container.innerHTML = emptyChartMsg('明日の朝、起床ボタンを押してみましょう。');
    return;
  }
  container.innerHTML = buildLineChartSVG(
    log.map(w => ({ date: w.date, value: w.minutes })),
    { fmt: fmtTime, invert: true, ariaLabel: '起床時刻の推移' }
  );
}

function renderWeightChart() {
  const container = document.getElementById('weight-chart');
  const todayLine = document.getElementById('weight-today-line');
  if (!container) return;
  const t = todayStr();
  const all = (store.weightLog || []).slice().sort(byDate);
  const log = all.slice(-14);
  const todayRec = all.find(w => w.date === t);
  todayLine.innerHTML = todayRec
    ? `今日の体重<b>${todayRec.weight.toFixed(1)} kg</b>`
    : '今日はまだ体重を記録していません';
  if (log.length === 0) {
    container.innerHTML = emptyChartMsg('上の欄に今日の体重を入力してください。');
    return;
  }
  container.innerHTML = buildLineChartSVG(
    log.map(w => ({ date: w.date, value: w.weight })),
    { fmt: fmtKg, invert: false, ariaLabel: '体重の推移' }
  );
}

function renderStudyChart() {
  const container = document.getElementById('study-chart');
  const todayLine = document.getElementById('study-today-line');
  if (!container) return;
  const t = todayStr();
  const all = (store.studyLog || []).slice().sort(byDate);
  const log = all.slice(-14);
  const todayRec = all.find(s => s.date === t);
  todayLine.innerHTML = todayRec
    ? `今日の勉強<b>${todayRec.minutes} 分</b>`
    : '今日はまだ勉強時間を記録していません';
  if (log.length === 0) {
    container.innerHTML = emptyChartMsg('上の欄に今日の勉強時間を入力してください。');
    return;
  }
  container.innerHTML = buildLineChartSVG(
    log.map(s => ({ date: s.date, value: s.minutes })),
    { fmt: fmtMin, invert: false, ariaLabel: '勉強時間の推移' }
  );
}

// ── Weight record ──
function saveWeight() {
  const input = document.getElementById('weight-input');
  const val = parseFloat(input.value);
  if (isNaN(val) || val <= 0 || val > 500) { showToast('正しい体重を入力してください'); return; }
  const rounded = Math.round(val * 10) / 10;
  const t = todayStr();
  const ex = store.weightLog.find(w => w.date === t);
  if (ex) ex.weight = rounded;
  else store.weightLog.push({ date: t, weight: rounded });
  saveStore();
  input.value = '';
  input.blur();
  renderWeightChart();
  if ('vibrate' in navigator) navigator.vibrate(30);
  showToast(`体重 ${rounded.toFixed(1)}kg を記録しました`);
}

document.getElementById('weight-save-btn').addEventListener('click', saveWeight);
document.getElementById('weight-input').addEventListener('keydown', e => { if (e.key === 'Enter') saveWeight(); });

// ── 起床時刻の入力・修正（ホームから上書き可能）──
function saveWakeTime() {
  const input = document.getElementById('wake-input');
  const v = input.value;
  if (!v || !/^\d{1,2}:\d{2}$/.test(v)) { showToast('時刻を入力してください'); return; }
  const [hh, mm] = v.split(':').map(Number);
  if (hh > 23 || mm > 59) { showToast('正しい時刻を入力してください'); return; }
  const t = todayStr();
  const p = n => String(n).padStart(2, '0');
  const time = `${p(hh)}:${p(mm)}`;
  const minutes = hh * 60 + mm;
  const ex = store.wakeLog.find(w => w.date === t);
  if (ex) { ex.time = time; ex.minutes = minutes; }       // 既存を上書き（修正）
  else store.wakeLog.push({ date: t, time, minutes });
  store.settings.lastWakeDate = t;
  saveStore();
  input.value = '';
  input.blur();
  renderWakeChart();
  if ('vibrate' in navigator) navigator.vibrate(30);
  showToast(`起床 ${time} を記録しました`);
}

// ── 勉強時間の入力・記録 ──
function saveStudy() {
  const input = document.getElementById('study-input');
  const val = parseInt(input.value, 10);
  if (isNaN(val) || val < 0 || val > 1440) { showToast('正しい勉強時間を入力してください'); return; }
  const t = todayStr();
  const ex = store.studyLog.find(s => s.date === t);
  if (ex) ex.minutes = val;
  else store.studyLog.push({ date: t, minutes: val });
  saveStore();
  input.value = '';
  input.blur();
  renderStudyChart();
  if ('vibrate' in navigator) navigator.vibrate(30);
  showToast(`勉強 ${val}分 を記録しました`);
}

document.getElementById('wake-save-btn').addEventListener('click', saveWakeTime);
document.getElementById('study-save-btn').addEventListener('click', saveStudy);
document.getElementById('study-input').addEventListener('keydown', e => { if (e.key === 'Enter') saveStudy(); });

// ── Data backup（エクスポート / インポート）──
async function exportData() {
  const json = JSON.stringify(store, null, 2);
  const filename = `cascade-backup-${todayStr()}.json`;
  // iOS PWA はファイルのダウンロードが不安定なため Web Share API を優先
  if (navigator.canShare) {
    try {
      const file = new File([json], filename, { type: 'application/json' });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'Cascade バックアップ' });
        return;
      }
    } catch (e) {
      if (e.name === 'AbortError') return;   // 共有をキャンセルした場合は何もしない
    }
  }
  // フォールバック: ダウンロード
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast('バックアップを書き出しました');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json,.json';
  input.addEventListener('change', () => {
    const file = input.files && input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      let data;
      try { data = JSON.parse(reader.result); }
      catch (e) { showToast('ファイルを読み込めませんでした'); return; }
      if (!data || typeof data !== 'object') { showToast('対応していないファイルです'); return; }
      if (!confirm('現在のデータを、選んだバックアップで上書きします。よろしいですか？')) return;
      store = migrate(data);
      saveStore();
      renderHome();
      showToast('バックアップから復元しました');
    };
    reader.readAsText(file);
  });
  input.click();
}

document.getElementById('export-btn').addEventListener('click', exportData);
document.getElementById('import-btn').addEventListener('click', importData);

// ── Habits ──
function renderHabits() {
  ensureToday();
  const t = todayStr();
  const defs = store.habits.definitions;
  const log = store.habits.logs[t];
  const list = document.getElementById('habit-list');
  list.innerHTML = '';

  defs.forEach(h => {
    const item = document.createElement('div');
    item.className = 'habit-item reveal' + (log[h.id] ? ' done' : '');
    item.dataset.id = h.id;
    item.innerHTML = `
      <span class="habit-icon">${h.icon}</span>
      <span class="habit-label">${h.label}</span>
      <div class="habit-check">
        <svg class="habit-check-svg" width="12" height="9" viewBox="0 0 12 9" fill="none">
          <path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    `;
    item.addEventListener('click', () => toggleHabit(h.id, item));
    list.appendChild(item);
  });

  renderHeatmap();
}

function toggleHabit(id, el) {
  const t = todayStr();
  store.habits.logs[t][id] = !store.habits.logs[t][id];
  saveStore();
  el.classList.toggle('done', store.habits.logs[t][id]);
  el.classList.remove('bounce');
  void el.offsetWidth;
  el.classList.add('bounce');
  if ('vibrate' in navigator) navigator.vibrate(30);
}

function renderHeatmap() {
  const dates = getWeekDates();
  const defs = store.habits.definitions;
  const grid = document.getElementById('heatmap-grid');
  grid.innerHTML = '';
  const DAYS_SHORT = ['日','月','火','水','木','金','土'];

  // Header row: empty label + 7 day labels
  const emptyCorner = document.createElement('div');
  grid.appendChild(emptyCorner);
  dates.forEach(d => {
    const day = new Date(d + 'T00:00:00').getDay();
    const lbl = document.createElement('div');
    lbl.className = 'heatmap-day-label';
    lbl.textContent = DAYS_SHORT[day];
    grid.appendChild(lbl);
  });

  defs.forEach(h => {
    const rowLabel = document.createElement('div');
    rowLabel.className = 'heatmap-row-label';
    rowLabel.textContent = h.icon;
    grid.appendChild(rowLabel);
    dates.forEach(d => {
      const cell = document.createElement('div');
      cell.className = 'heatmap-cell';
      const log = store.habits.logs[d] || {};
      if (log[h.id]) cell.classList.add('done');
      grid.appendChild(cell);
    });
  });
}

// ── Toast ──
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── Init ──
function init() {
  ensureToday();
  renderHome();
  activateReveal();
  loadStudyMenu();

  const t = todayStr();
  if (store.settings.lastWakeDate !== t) {
    setTimeout(showWakeGate, 200);
  }
}

// 一級建築士: schedule.json から本日の学習メニューを表示
function loadStudyMenu() {
  const el = document.getElementById('study-menu');
  if (!el) return;
  fetch('./schedule.json?v=' + Date.now()).then(r => r.json()).then(sched => {
    const m = sched[todayStr()];
    if (!m) { el.innerHTML = ''; return; }
    const rest = m.problems === 0;
    el.innerHTML =
      '<div style="display:flex;gap:10px;align-items:center;padding:12px 14px;margin-bottom:14px;'
      + 'border-radius:12px;background:' + (rest ? 'rgba(255,255,255,.04)' : 'rgba(120,170,255,.10)')
      + ';border:1px solid ' + (rest ? 'rgba(255,255,255,.08)' : 'rgba(120,170,255,.22)') + ';">'
      + '<span style="font-size:22px;line-height:1">' + m.icon + '</span>'
      + '<span style="font-size:13px;line-height:1.45">'
      + '<b>本日の学習</b><br>' + m.menu
      + (rest ? '' : '<span style="opacity:.6"> ・' + m.problems + '問 / 約' + m.time + '分</span>')
      + '</span></div>';
  }).catch(() => { el.innerHTML = ''; });
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
  // 新しい Service Worker が制御を取ったら一度だけ自動リロード（更新を即反映）
  let swReloaded = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (swReloaded) return;
    swReloaded = true;
    location.reload();
  });
}
