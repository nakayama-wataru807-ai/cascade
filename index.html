<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F5F0E8">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Cascade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=BIZ+UDGothic:wght@400;700&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --kinari: #F5F0E8;
  --kinari-2: #EDE7D9;
  --kinari-3: #E4DDD0;
  --sumi: #1C1C1A;
  --sumi-soft: #3D3B33;
  --sumi-muted: #7A776E;
  --ki: #C4833A;
  --ki-pale: #EDD5A8;
  --ki-deep: #9E6228;
  --take: #4A5C42;
  --tetsusabi: #5C4033;
  --line: rgba(28,28,26,0.10);
  --line-strong: rgba(28,28,26,0.22);
  --shadow: 0 2px 12px rgba(28,28,26,0.08);
  --shadow-up: 0 -2px 16px rgba(28,28,26,0.06);
  --font-mincho: 'Shippori Mincho', serif;
  --font-gothic: 'BIZ UDGothic', system-ui, sans-serif;
  --font-latin: 'Space Grotesk', system-ui;
  --r1: 2px; --r2: 4px; --r3: 8px; --r4: 16px;
  --ease-struct: cubic-bezier(0.16, 0.84, 0.32, 1);
  --ease-snap: cubic-bezier(0.34, 1.56, 0.64, 1);
  --nav-h: calc(60px + env(safe-area-inset-bottom));
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--kinari);
  color: var(--sumi);
  font-family: var(--font-gothic);
  font-size: 15px;
  line-height: 1.6;
  overscroll-behavior: none;
}

/* ── App Shell ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}

/* ── Views ── */
.view {
  display: none;
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px;
  padding-bottom: calc(var(--nav-h) + 16px);
  overscroll-behavior-y: contain;
}
.view.active { display: block; }

/* ── Bottom Nav ── */
#nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  height: var(--nav-h);
  background: var(--kinari);
  border-top: 1px solid var(--line);
  display: flex;
  align-items: flex-start;
  padding-bottom: env(safe-area-inset-bottom);
  box-shadow: var(--shadow-up);
  z-index: 100;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding-top: 10px;
  gap: 3px;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--sumi-muted);
  font-family: var(--font-gothic);
  font-size: 10px;
  letter-spacing: 0.02em;
  position: relative;
  transition: color 0.2s;
}
.nav-item.active { color: var(--ki); }
.nav-item.active::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 2px;
  background: var(--ki);
  border-radius: 0 0 2px 2px;
}
.nav-icon { font-size: 20px; line-height: 1; }

/* ── Typography ── */
.screen-title {
  font-family: var(--font-mincho);
  font-weight: 500;
  font-size: clamp(18px, 5vw, 22px);
  color: var(--sumi);
  letter-spacing: 0.04em;
  margin-bottom: 24px;
}

.label {
  font-family: var(--font-latin);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--sumi-muted);
}

/* ── Card ── */
.card {
  background: var(--kinari-2);
  border-radius: var(--r3);
  padding: 16px;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
}

/* ── Morning Gate Modal ── */
#morning-gate {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: var(--kinari);
  flex-direction: column;
  overflow-y: auto;
  padding: 48px 28px calc(48px + env(safe-area-inset-bottom));
}
#morning-gate.open { display: flex; }

.gate-eyebrow {
  font-family: var(--font-latin);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.18em;
  color: var(--ki);
  text-transform: uppercase;
  opacity: 0;
  animation: fadeUp 0.5s 0.1s var(--ease-struct) forwards;
}

.gate-quote {
  margin: 20px 0 8px;
  font-family: var(--font-mincho);
  font-weight: 500;
  font-size: clamp(18px, 5.5vw, 24px);
  line-height: 1.7;
  color: var(--sumi);
  letter-spacing: 0.06em;
  opacity: 0;
  animation: fadeUp 0.6s 0.25s var(--ease-struct) forwards;
}

.gate-author {
  font-family: var(--font-latin);
  font-size: 12px;
  color: var(--sumi-muted);
  letter-spacing: 0.06em;
  opacity: 0;
  animation: fadeUp 0.5s 0.4s var(--ease-struct) forwards;
  margin-bottom: 32px;
}

.gate-divider {
  width: 40px;
  height: 1px;
  background: var(--ki);
  margin: 0 0 28px;
  opacity: 0;
  animation: fadeUp 0.4s 0.5s ease forwards;
}

.gate-streak {
  opacity: 0;
  animation: fadeUp 0.5s 0.55s var(--ease-struct) forwards;
  margin-bottom: 28px;
}

.streak-label {
  font-family: var(--font-latin);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--sumi-muted);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.streak-towers {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 48px;
}

.streak-tower {
  width: 8px;
  background: var(--ki-pale);
  border-radius: 1px 1px 0 0;
  animation: growUp 0.4s var(--ease-struct) forwards;
  transform-origin: bottom;
  transform: scaleY(0);
}
.streak-tower.lit { background: var(--ki); }
.streak-tower.today { background: var(--take); }

.streak-count {
  font-family: var(--font-latin);
  font-size: 28px;
  font-weight: 600;
  color: var(--take);
  font-feature-settings: "tnum";
  line-height: 1;
  margin-top: 8px;
}
.streak-count span {
  font-size: 13px;
  font-weight: 400;
  color: var(--sumi-muted);
  margin-left: 4px;
}

.gate-intent {
  opacity: 0;
  animation: fadeUp 0.5s 0.7s var(--ease-struct) forwards;
  margin-bottom: 32px;
}

.gate-intent label {
  display: block;
  font-family: var(--font-mincho);
  font-size: 14px;
  color: var(--sumi-soft);
  margin-bottom: 8px;
}

.intent-input {
  width: 100%;
  padding: 12px 14px;
  background: var(--kinari-3);
  border: 1px solid var(--line-strong);
  border-radius: var(--r2);
  font-family: var(--font-gothic);
  font-size: 15px;
  color: var(--sumi);
  outline: none;
  transition: border-color 0.2s;
}
.intent-input:focus { border-color: var(--ki); }
.intent-input::placeholder { color: var(--sumi-muted); }

.gate-btn {
  opacity: 0;
  animation: fadeUp 0.5s 0.85s var(--ease-struct) forwards;
  width: 100%;
  padding: 16px;
  background: var(--sumi);
  color: var(--kinari);
  font-family: var(--font-mincho);
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 0.1em;
  border: none;
  border-radius: var(--r2);
  cursor: pointer;
  transition: background 0.2s, transform 0.15s var(--ease-snap);
  -webkit-appearance: none;
}
.gate-btn:active { transform: scale(0.98); background: var(--sumi-soft); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes growUp {
  to { transform: scaleY(1); }
}

/* ── Home View ── */
.home-date {
  font-family: var(--font-mincho);
  font-size: clamp(22px, 6vw, 28px);
  font-weight: 700;
  color: var(--sumi);
  line-height: 1.2;
  margin-bottom: 4px;
}
.home-weekday {
  font-family: var(--font-latin);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--sumi-muted);
  text-transform: uppercase;
  margin-bottom: 24px;
}

.home-ring-card {
  background: var(--kinari-2);
  border-radius: var(--r3);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 20px;
}

.ring-wrap {
  position: relative;
  width: 80px;
  height: 80px;
  flex-shrink: 0;
}
.ring-wrap svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--kinari-3); stroke-width: 6; }
.ring-fill {
  fill: none;
  stroke: var(--ki);
  stroke-width: 6;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.8s var(--ease-struct);
}
.ring-text {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.ring-num {
  font-family: var(--font-latin);
  font-size: 20px;
  font-weight: 600;
  color: var(--sumi);
  font-feature-settings: "tnum";
  line-height: 1;
}
.ring-denom {
  font-family: var(--font-latin);
  font-size: 10px;
  color: var(--sumi-muted);
}

.ring-info { flex: 1; }
.ring-info-title {
  font-family: var(--font-mincho);
  font-size: 13px;
  color: var(--sumi-muted);
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}
.ring-intent {
  font-family: var(--font-gothic);
  font-size: 14px;
  color: var(--sumi);
  line-height: 1.5;
}
.ring-intent-empty {
  font-family: var(--font-gothic);
  font-size: 13px;
  color: var(--sumi-muted);
  font-style: italic;
}

.home-quote-card {
  background: var(--sumi);
  color: var(--kinari);
  border-radius: var(--r3);
  padding: 20px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}
.home-quote-card::before {
  content: '"';
  position: absolute;
  top: -10px; right: 12px;
  font-family: var(--font-mincho);
  font-size: 80px;
  color: rgba(245,240,232,0.08);
  line-height: 1;
  pointer-events: none;
}
.home-quote-text {
  font-family: var(--font-mincho);
  font-size: clamp(13px, 3.8vw, 15px);
  line-height: 1.8;
  letter-spacing: 0.04em;
  color: var(--kinari);
  margin-bottom: 8px;
}
.home-quote-author {
  font-family: var(--font-latin);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: rgba(245,240,232,0.5);
}

.evening-prompt {
  display: none;
  background: linear-gradient(135deg, var(--ki-deep) 0%, var(--ki) 100%);
  border-radius: var(--r3);
  padding: 16px 20px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: transform 0.15s var(--ease-snap);
}
.evening-prompt:active { transform: scale(0.98); }
.evening-prompt.show { display: block; }
.evening-prompt-label {
  font-family: var(--font-latin);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  margin-bottom: 4px;
}
.evening-prompt-text {
  font-family: var(--font-mincho);
  font-size: 15px;
  color: #fff;
  letter-spacing: 0.04em;
}

/* ── Habit Stack View ── */
.habit-item {
  background: var(--kinari-2);
  border-radius: var(--r3);
  padding: 14px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  border-left: 3px solid transparent;
  box-shadow: var(--shadow);
  transition: background 0.2s, border-color 0.2s, transform 0.15s var(--ease-snap);
  user-select: none;
}
.habit-item.done {
  background: var(--ki-pale);
  border-left-color: var(--ki);
}
.habit-item:active { transform: scale(0.985); }

.habit-icon { font-size: 22px; line-height: 1; flex-shrink: 0; }
.habit-label {
  flex: 1;
  font-family: var(--font-gothic);
  font-size: 15px;
  color: var(--sumi);
  font-weight: 700;
}
.habit-item.done .habit-label { color: var(--ki-deep); }
.habit-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--line-strong);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s, border-color 0.2s;
}
.habit-item.done .habit-check {
  background: var(--ki);
  border-color: var(--ki);
}
.habit-check-svg { display: none; }
.habit-item.done .habit-check-svg { display: block; }

@keyframes habitBounce {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.06); }
  70%  { transform: scale(0.97); }
  100% { transform: scale(1); }
}
.habit-item.bounce { animation: habitBounce 0.35s var(--ease-struct); }

.heatmap-section {
  margin-top: 24px;
  margin-bottom: 8px;
}
.heatmap-title {
  font-family: var(--font-latin);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--sumi-muted);
  margin-bottom: 10px;
}
.heatmap-grid {
  display: grid;
  grid-template-columns: auto repeat(7, 1fr);
  gap: 3px;
  font-size: 0;
}
.heatmap-row-label {
  font-family: var(--font-gothic);
  font-size: 9px;
  color: var(--sumi-muted);
  display: flex;
  align-items: center;
  padding-right: 4px;
  white-space: nowrap;
}
.heatmap-cell {
  aspect-ratio: 1;
  border-radius: 2px;
  background: var(--kinari-3);
}
.heatmap-cell.done { background: var(--ki); }
.heatmap-cell.partial { background: var(--ki-pale); }
.heatmap-day-label {
  font-family: var(--font-latin);
  font-size: 9px;
  color: var(--sumi-muted);
  text-align: center;
  padding-bottom: 2px;
}

/* ── Tasks View ── */
.add-task-btn {
  width: 100%;
  padding: 14px;
  background: none;
  border: 1.5px dashed var(--line-strong);
  border-radius: var(--r3);
  font-family: var(--font-gothic);
  font-size: 14px;
  color: var(--sumi-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 16px;
  transition: border-color 0.2s, color 0.2s;
}
.add-task-btn:active { border-color: var(--ki); color: var(--ki); }

.task-item {
  background: var(--kinari-2);
  border-radius: var(--r3);
  padding: 13px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: var(--shadow);
  transition: opacity 0.2s;
}
.task-item.done { opacity: 0.45; }
.task-check-btn {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--line-strong);
  background: none;
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, border-color 0.2s;
}
.task-item.done .task-check-btn {
  background: var(--take);
  border-color: var(--take);
}
.task-label {
  flex: 1;
  font-family: var(--font-gothic);
  font-size: 14px;
  color: var(--sumi);
  line-height: 1.4;
}
.task-item.done .task-label { text-decoration: line-through; color: var(--sumi-muted); }
.task-delete-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--sumi-muted);
  font-size: 16px;
  padding: 2px 4px;
  line-height: 1;
  opacity: 0.5;
  transition: opacity 0.2s;
}
.task-delete-btn:active { opacity: 1; color: var(--tetsusabi); }

.tasks-empty {
  text-align: center;
  padding: 40px 0;
  color: var(--sumi-muted);
  font-family: var(--font-mincho);
  font-size: 14px;
  letter-spacing: 0.04em;
}

/* ── Evening View ── */
.evening-habits-summary {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 8px;
  min-height: 28px;
}
.habit-badge {
  background: var(--ki-pale);
  color: var(--ki-deep);
  font-family: var(--font-gothic);
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.no-habits-msg {
  color: var(--sumi-muted);
  font-size: 13px;
  font-family: var(--font-mincho);
}

.score-row {
  display: flex;
  gap: 8px;
  margin: 8px 0 4px;
}
.score-btn {
  flex: 1;
  aspect-ratio: 1;
  background: var(--kinari-3);
  border: 1.5px solid transparent;
  border-radius: var(--r3);
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, border-color 0.15s, transform 0.15s var(--ease-snap);
}
.score-btn:active, .score-btn.selected {
  background: var(--ki-pale);
  border-color: var(--ki);
  transform: scale(1.08);
}

.evening-textarea {
  width: 100%;
  padding: 12px 14px;
  background: var(--kinari-3);
  border: 1px solid var(--line-strong);
  border-radius: var(--r2);
  font-family: var(--font-gothic);
  font-size: 14px;
  color: var(--sumi);
  outline: none;
  resize: none;
  min-height: 80px;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.evening-textarea:focus { border-color: var(--ki); }
.evening-textarea::placeholder { color: var(--sumi-muted); }
.evening-input {
  width: 100%;
  padding: 12px 14px;
  background: var(--kinari-3);
  border: 1px solid var(--line-strong);
  border-radius: var(--r2);
  font-family: var(--font-gothic);
  font-size: 14px;
  color: var(--sumi);
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.evening-input:focus { border-color: var(--ki); }
.evening-input::placeholder { color: var(--sumi-muted); }

.section-label {
  font-family: var(--font-mincho);
  font-size: 13px;
  color: var(--sumi-soft);
  letter-spacing: 0.04em;
  margin-bottom: 8px;
  margin-top: 4px;
  display: block;
}

.save-btn {
  width: 100%;
  padding: 16px;
  margin-top: 20px;
  background: var(--sumi);
  color: var(--kinari);
  font-family: var(--font-mincho);
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.1em;
  border: none;
  border-radius: var(--r2);
  cursor: pointer;
  transition: background 0.2s, transform 0.15s var(--ease-snap);
  -webkit-appearance: none;
}
.save-btn:active { transform: scale(0.98); background: var(--sumi-soft); }
.save-btn.saved { background: var(--take); }

/* ── Modal overlay (task add) ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(28,28,26,0.4);
  z-index: 150;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  background: var(--kinari);
  width: 100%;
  max-width: 480px;
  border-radius: 16px 16px 0 0;
  padding: 24px 20px calc(20px + env(safe-area-inset-bottom));
  animation: slideUp 0.3s var(--ease-struct);
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.modal-title {
  font-family: var(--font-mincho);
  font-size: 16px;
  color: var(--sumi);
  margin-bottom: 16px;
}
.modal-input {
  width: 100%;
  padding: 12px 14px;
  background: var(--kinari-3);
  border: 1px solid var(--line-strong);
  border-radius: var(--r2);
  font-family: var(--font-gothic);
  font-size: 15px;
  color: var(--sumi);
  outline: none;
  margin-bottom: 12px;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.modal-input:focus { border-color: var(--ki); }
.modal-confirm-btn {
  width: 100%;
  padding: 14px;
  background: var(--ki);
  color: #fff;
  font-family: var(--font-gothic);
  font-size: 15px;
  font-weight: 700;
  border: none;
  border-radius: var(--r2);
  cursor: pointer;
  transition: background 0.2s;
  -webkit-appearance: none;
}
.modal-confirm-btn:active { background: var(--ki-deep); }

/* ── Intersection Observer reveal ── */
.reveal {
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.5s var(--ease-struct), transform 0.5s var(--ease-struct);
}
.reveal.visible {
  opacity: 1;
  transform: none;
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: calc(var(--nav-h) + 12px);
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--sumi);
  color: var(--kinari);
  font-family: var(--font-gothic);
  font-size: 13px;
  padding: 10px 20px;
  border-radius: 20px;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  z-index: 300;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>
<div id="app">
  <!-- Morning Gate -->
  <div id="morning-gate">
    <div class="gate-eyebrow">Cascade — 今日も積み上げる</div>
    <p class="gate-quote" id="gate-quote-text"></p>
    <p class="gate-author" id="gate-quote-author"></p>
    <div class="gate-divider"></div>
    <div class="gate-streak">
      <div class="streak-label">連続起動</div>
      <div class="streak-towers" id="streak-towers"></div>
      <div class="streak-count" id="streak-count">0<span>日</span></div>
    </div>
    <div class="gate-intent">
      <label for="intent-input">今日の意図を一言で</label>
      <input class="intent-input" id="intent-input" type="text" placeholder="今日の最重要テーマを一言で..." autocomplete="off">
    </div>
    <button class="gate-btn" id="gate-close-btn">今日も積み上げる</button>
  </div>

  <!-- Views -->
  <main id="views" style="flex:1;overflow:hidden;position:relative;">
    <!-- Home -->
    <section class="view active" id="view-home">
      <div class="home-date" id="home-date"></div>
      <div class="home-weekday" id="home-weekday"></div>

      <div class="home-ring-card reveal">
        <div class="ring-wrap">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle class="ring-bg" cx="40" cy="40" r="34"/>
            <circle class="ring-fill" id="ring-fill" cx="40" cy="40" r="34"
              stroke-dasharray="213.6"
              stroke-dashoffset="213.6"/>
          </svg>
          <div class="ring-text">
            <div class="ring-num" id="ring-num">0</div>
            <div class="ring-denom" id="ring-denom">/8</div>
          </div>
        </div>
        <div class="ring-info">
          <div class="ring-info-title">今日の意図</div>
          <div id="ring-intent-text" class="ring-intent-empty">Morning Gateで入力しましょう</div>
        </div>
      </div>

      <div class="home-quote-card reveal" id="home-quote-card">
        <div class="home-quote-text" id="home-quote-text"></div>
        <div class="home-quote-author" id="home-quote-author"></div>
      </div>

      <div class="evening-prompt reveal" id="evening-prompt" onclick="navigate('evening')">
        <div class="evening-prompt-label">17:00 以降</div>
        <div class="evening-prompt-text">今日の振り返りをしましょう →</div>
      </div>
    </section>

    <!-- Habit Stack -->
    <section class="view" id="view-habits">
      <h2 class="screen-title">習慣スタック</h2>
      <div id="habit-list"></div>
      <div class="heatmap-section">
        <div class="heatmap-title">今週の記録</div>
        <div class="heatmap-grid" id="heatmap-grid"></div>
      </div>
    </section>

    <!-- Tasks -->
    <section class="view" id="view-tasks">
      <h2 class="screen-title">タスク</h2>
      <button class="add-task-btn" id="add-task-btn">
        <span style="font-size:18px;line-height:1">＋</span> タスクを追加
      </button>
      <div id="task-list"></div>
    </section>

    <!-- Evening Close -->
    <section class="view" id="view-evening">
      <h2 class="screen-title">夜の記録</h2>
      <div class="card reveal">
        <div class="label" style="margin-bottom:10px">今日の達成習慣</div>
        <div class="evening-habits-summary" id="evening-habits-summary"></div>
      </div>
      <div class="card reveal">
        <label class="section-label" for="evening-note">今日の収穫・気づき</label>
        <textarea class="evening-textarea" id="evening-note" rows="3"
          placeholder="今日の収穫・気づきをひとこと..."></textarea>
      </div>
      <div class="card reveal">
        <div class="section-label" style="margin-bottom:4px">今日の満足度</div>
        <div class="score-row" id="score-row">
          <button class="score-btn" data-score="1">😞</button>
          <button class="score-btn" data-score="2">😐</button>
          <button class="score-btn" data-score="3">😊</button>
          <button class="score-btn" data-score="4">😄</button>
          <button class="score-btn" data-score="5">🌟</button>
        </div>
      </div>
      <div class="card reveal">
        <label class="section-label" for="tomorrow-task">明日の最重要タスク</label>
        <input class="evening-input" id="tomorrow-task" type="text"
          placeholder="明日必ずやること...">
      </div>
      <button class="save-btn" id="save-evening-btn">今日の記録を保存</button>
    </section>
  </main>

  <!-- Bottom Nav -->
  <nav id="nav">
    <button class="nav-item active" data-view="home">
      <span class="nav-icon">⌂</span>
      <span>ホーム</span>
    </button>
    <button class="nav-item" data-view="habits">
      <span class="nav-icon">◎</span>
      <span>習慣</span>
    </button>
    <button class="nav-item" data-view="tasks">
      <span class="nav-icon">☑</span>
      <span>タスク</span>
    </button>
    <button class="nav-item" data-view="evening">
      <span class="nav-icon">🌙</span>
      <span>夜記</span>
    </button>
  </nav>
</div>

<!-- Task Add Modal -->
<div class="modal-overlay" id="task-modal">
  <div class="modal-sheet">
    <div class="modal-title">タスクを追加</div>
    <input class="modal-input" id="modal-task-input" type="text"
      placeholder="タスク名を入力..." autocomplete="off">
    <button class="modal-confirm-btn" id="modal-confirm-btn">追加</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Quotes ──
const QUOTES = [
  { text: '建築は凍れる音楽である', author: 'F.W.J. シェリング' },
  { text: 'Less is more', author: 'ミース・ファン・デル・ローエ' },
  { text: '形は機能に従う', author: 'ルイス・サリヴァン' },
  { text: '小さな行動が、世界を変える。', author: 'M. ガンジー' },
  { text: '一日一日を、確実に積み上げよ。', author: 'Cascade' },
  { text: '建物は使われるとき、建築になる。', author: '内藤廣' },
  { text: '継続は力なり', author: '日本の格言' },
  { text: "You don't rise to your goals,\nyou fall to your systems.", author: 'James Clear' },
  { text: '光が差し込む隙間をつくること。\nそれが設計だ。', author: '' },
  { text: 'すべての偉大な建築は、\n小さなスケッチから始まる。', author: '' },
  { text: '空間は、そこに立つ人の記憶を宿す。', author: '' },
  { text: '規律とは、自由への最短経路だ。', author: '' },
];

// ── Store ──
const STORE_KEY = 'cascade_v1';
const DEFAULT_HABITS = [
  {id:'h1',label:'早起き',icon:'🌅'},
  {id:'h2',label:'筋トレ',icon:'💪'},
  {id:'h3',label:'体重記録',icon:'⚖️'},
  {id:'h4',label:'間食増量',icon:'🍱'},
  {id:'h5',label:'建築士勉強',icon:'📐'},
  {id:'h6',label:'修論作業',icon:'✏️'},
  {id:'h7',label:'読書',icon:'📚'},
  {id:'h8',label:'日記振り返り',icon:'📓'},
];

function loadStore() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    settings: { lastMorningGateDate: '', lastQuoteIndex: 0 },
    habits: { definitions: DEFAULT_HABITS, logs: {} },
    daily: {},
    tasks: { items: [] },
    streak: { current: 0, longest: 0, lastDate: '' },
  };
}

function saveStore() {
  localStorage.setItem(STORE_KEY, JSON.stringify(store));
}

let store = loadStore();

// ── Date helpers ──
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function ensureToday() {
  const t = todayStr();
  if (!store.habits.logs[t]) store.habits.logs[t] = {};
  if (!store.daily[t]) store.daily[t] = { morningIntent:'', eveningNote:'', score:0, tomorrow:'', weight:0 };
}

function getWeekDates() {
  const dates = [];
  const today = new Date();
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    dates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
  }
  return dates;
}

// ── Streak ──
function updateStreak() {
  const t = todayStr();
  if (store.streak.lastDate === t) return;
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yd = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
  if (store.streak.lastDate === yd) {
    store.streak.current += 1;
  } else if (store.streak.lastDate !== t) {
    store.streak.current = 1;
  }
  if (store.streak.current > store.streak.longest) store.streak.longest = store.streak.current;
  store.streak.lastDate = t;
  saveStore();
}

// ── Morning Gate ──
function showMorningGate() {
  const gate = document.getElementById('morning-gate');
  gate.classList.add('open');

  const qi = (store.settings.lastQuoteIndex + 1) % QUOTES.length;
  store.settings.lastQuoteIndex = qi;
  const q = QUOTES[qi];
  document.getElementById('gate-quote-text').textContent = q.text;
  document.getElementById('gate-quote-author').textContent = q.author ? `— ${q.author}` : '';

  renderStreakTowers();

  const intent = store.daily[todayStr()]?.morningIntent || '';
  document.getElementById('intent-input').value = intent;
}

function renderStreakTowers() {
  const sc = store.streak.current;
  const count = Math.min(sc, 14);
  const container = document.getElementById('streak-towers');
  container.innerHTML = '';
  const maxH = 42;
  for (let i = 0; i < 14; i++) {
    const tower = document.createElement('div');
    tower.className = 'streak-tower';
    const h = Math.max(6, Math.round((maxH / 14) * (i + 1)));
    tower.style.height = h + 'px';
    tower.style.animationDelay = (i * 30) + 'ms';
    if (i < count - 1) tower.classList.add('lit');
    if (i === count - 1) tower.classList.add('today');
    container.appendChild(tower);
  }
  document.getElementById('streak-count').innerHTML = `${sc}<span>日連続</span>`;
}

document.getElementById('gate-close-btn').addEventListener('click', () => {
  const intent = document.getElementById('intent-input').value.trim();
  const t = todayStr();
  store.daily[t].morningIntent = intent;
  store.settings.lastMorningGateDate = t;
  saveStore();
  document.getElementById('morning-gate').classList.remove('open');
  renderHome();
});

// ── Navigation ──
function navigate(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('view-' + viewId).classList.add('active');
  document.querySelector(`.nav-item[data-view="${viewId}"]`)?.classList.add('active');
  if (viewId === 'home') renderHome();
  if (viewId === 'habits') renderHabits();
  if (viewId === 'tasks') renderTasks();
  if (viewId === 'evening') renderEvening();
  activateReveal();
}

document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => navigate(btn.dataset.view));
});

// ── Intersection Observer for reveal ──
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); revealObserver.unobserve(e.target); } });
}, { threshold: 0.1 });

function activateReveal() {
  requestAnimationFrame(() => {
    document.querySelectorAll('.reveal:not(.visible)').forEach(el => revealObserver.observe(el));
  });
}

// ── Home ──
function renderHome() {
  ensureToday();
  const t = todayStr();
  const d = new Date();
  const DAYS = ['日','月','火','水','木','金','土'];
  document.getElementById('home-date').textContent = `${d.getMonth()+1}月${d.getDate()}日`;
  document.getElementById('home-weekday').textContent = `${DAYS[d.getDay()]}曜日 — ${d.getFullYear()}`;

  const defs = store.habits.definitions;
  const log = store.habits.logs[t] || {};
  const done = defs.filter(h => log[h.id]).length;
  const total = defs.length;
  const pct = total > 0 ? done / total : 0;
  const circ = 213.6;
  const offset = circ - circ * pct;
  document.getElementById('ring-fill').style.strokeDashoffset = offset;
  document.getElementById('ring-num').textContent = done;
  document.getElementById('ring-denom').textContent = `/${total}`;

  const intent = store.daily[t]?.morningIntent || '';
  const intentEl = document.getElementById('ring-intent-text');
  if (intent) {
    intentEl.textContent = intent;
    intentEl.className = 'ring-intent';
  } else {
    intentEl.textContent = 'Morning Gateで入力しましょう';
    intentEl.className = 'ring-intent-empty';
  }

  const qi = store.settings.lastQuoteIndex;
  const q = QUOTES[qi];
  document.getElementById('home-quote-text').textContent = q.text;
  document.getElementById('home-quote-author').textContent = q.author ? `— ${q.author}` : '';

  const h = d.getHours();
  const prompt = document.getElementById('evening-prompt');
  if (h >= 17) prompt.classList.add('show');
  else prompt.classList.remove('show');
}

// ── Habits ──
function renderHabits() {
  ensureToday();
  const t = todayStr();
  const defs = store.habits.definitions;
  const log = store.habits.logs[t];
  const list = document.getElementById('habit-list');
  list.innerHTML = '';

  defs.forEach(h => {
    const item = document.createElement('div');
    item.className = 'habit-item reveal' + (log[h.id] ? ' done' : '');
    item.dataset.id = h.id;
    item.innerHTML = `
      <span class="habit-icon">${h.icon}</span>
      <span class="habit-label">${h.label}</span>
      <div class="habit-check">
        <svg class="habit-check-svg" width="12" height="9" viewBox="0 0 12 9" fill="none">
          <path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    `;
    item.addEventListener('click', () => toggleHabit(h.id, item));
    list.appendChild(item);
  });

  renderHeatmap();
}

function toggleHabit(id, el) {
  const t = todayStr();
  store.habits.logs[t][id] = !store.habits.logs[t][id];
  saveStore();
  el.classList.toggle('done', store.habits.logs[t][id]);
  el.classList.remove('bounce');
  void el.offsetWidth;
  el.classList.add('bounce');
  if ('vibrate' in navigator) navigator.vibrate(30);
  updateRingFromHabits();
}

function updateRingFromHabits() {
  const t = todayStr();
  const defs = store.habits.definitions;
  const log = store.habits.logs[t] || {};
  const done = defs.filter(h => log[h.id]).length;
  const total = defs.length;
  const pct = total > 0 ? done / total : 0;
  const circ = 213.6;
  document.getElementById('ring-fill').style.strokeDashoffset = circ - circ * pct;
  document.getElementById('ring-num').textContent = done;
}

function renderHeatmap() {
  const dates = getWeekDates();
  const defs = store.habits.definitions;
  const grid = document.getElementById('heatmap-grid');
  grid.innerHTML = '';
  const DAYS_SHORT = ['日','月','火','水','木','金','土'];

  // Header row: empty label + 7 day labels
  const emptyCorner = document.createElement('div');
  grid.appendChild(emptyCorner);
  dates.forEach(d => {
    const day = new Date(d + 'T00:00:00').getDay();
    const lbl = document.createElement('div');
    lbl.className = 'heatmap-day-label';
    lbl.textContent = DAYS_SHORT[day];
    grid.appendChild(lbl);
  });

  defs.forEach(h => {
    const rowLabel = document.createElement('div');
    rowLabel.className = 'heatmap-row-label';
    rowLabel.textContent = h.icon;
    grid.appendChild(rowLabel);
    dates.forEach(d => {
      const cell = document.createElement('div');
      cell.className = 'heatmap-cell';
      const log = store.habits.logs[d] || {};
      if (log[h.id]) cell.classList.add('done');
      grid.appendChild(cell);
    });
  });
}

// ── Tasks ──
function renderTasks() {
  const items = store.tasks.items;
  const list = document.getElementById('task-list');
  list.innerHTML = '';
  if (items.length === 0) {
    list.innerHTML = '<div class="tasks-empty">タスクはまだありません</div>';
    return;
  }
  items.forEach((task, i) => {
    const el = document.createElement('div');
    el.className = 'task-item reveal' + (task.done ? ' done' : '');
    el.innerHTML = `
      <button class="task-check-btn" data-i="${i}" aria-label="完了切替">
        ${task.done ? '<svg width="11" height="8" viewBox="0 0 11 8" fill="none"><path d="M1 3.5L4 6.5L10 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}
      </button>
      <span class="task-label">${escapeHtml(task.label)}</span>
      <button class="task-delete-btn" data-i="${i}" aria-label="削除">✕</button>
    `;
    el.querySelector('.task-check-btn').addEventListener('click', () => {
      store.tasks.items[i].done = !store.tasks.items[i].done;
      saveStore(); renderTasks();
    });
    el.querySelector('.task-delete-btn').addEventListener('click', () => {
      store.tasks.items.splice(i, 1);
      saveStore(); renderTasks();
    });
    list.appendChild(el);
  });
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('add-task-btn').addEventListener('click', () => {
  document.getElementById('task-modal').classList.add('open');
  setTimeout(() => document.getElementById('modal-task-input').focus(), 100);
});

document.getElementById('modal-confirm-btn').addEventListener('click', addTask);
document.getElementById('modal-task-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

function addTask() {
  const val = document.getElementById('modal-task-input').value.trim();
  if (!val) return;
  store.tasks.items.push({ label: val, done: false, createdAt: new Date().toISOString() });
  saveStore();
  document.getElementById('modal-task-input').value = '';
  document.getElementById('task-modal').classList.remove('open');
  renderTasks();
}

document.getElementById('task-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('task-modal')) {
    document.getElementById('task-modal').classList.remove('open');
  }
});

// ── Evening ──
let selectedScore = 0;

function renderEvening() {
  ensureToday();
  const t = todayStr();
  const defs = store.habits.definitions;
  const log = store.habits.logs[t] || {};
  const summary = document.getElementById('evening-habits-summary');
  summary.innerHTML = '';
  const done = defs.filter(h => log[h.id]);
  if (done.length === 0) {
    summary.innerHTML = '<span class="no-habits-msg">まだ習慣が完了していません</span>';
  } else {
    done.forEach(h => {
      const badge = document.createElement('div');
      badge.className = 'habit-badge';
      badge.textContent = `${h.icon} ${h.label}`;
      summary.appendChild(badge);
    });
  }

  const day = store.daily[t];
  document.getElementById('evening-note').value = day.eveningNote || '';
  document.getElementById('tomorrow-task').value = day.tomorrow || '';
  selectedScore = day.score || 0;
  document.querySelectorAll('.score-btn').forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.score) === selectedScore);
  });
  document.getElementById('save-evening-btn').classList.remove('saved');
}

document.querySelectorAll('.score-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    selectedScore = parseInt(btn.dataset.score);
    document.querySelectorAll('.score-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  });
});

document.getElementById('save-evening-btn').addEventListener('click', () => {
  const t = todayStr();
  store.daily[t].eveningNote = document.getElementById('evening-note').value.trim();
  store.daily[t].tomorrow = document.getElementById('tomorrow-task').value.trim();
  store.daily[t].score = selectedScore;
  saveStore();
  const btn = document.getElementById('save-evening-btn');
  btn.textContent = '保存しました ✓';
  btn.classList.add('saved');
  showToast('今日の記録を保存しました');
  if ('vibrate' in navigator) navigator.vibrate([30, 20, 30]);
  setTimeout(() => { btn.textContent = '今日の記録を保存'; btn.classList.remove('saved'); }, 2500);
});

// ── Toast ──
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── Init ──
function init() {
  ensureToday();
  updateStreak();
  renderHome();
  activateReveal();

  const t = todayStr();
  if (store.settings.lastMorningGateDate !== t) {
    setTimeout(showMorningGate, 300);
  }
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
